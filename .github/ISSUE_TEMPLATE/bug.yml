name: Bug
description: 구현 중 발견된 버그 (Task와 별도 추적)
title: "[BUG] "
labels: ["type:bug"]
body:
  - type: input
    id: related_task
    attributes:
      label: 관련 Task ID (있으면)
      placeholder: "T-603"
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 절차
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 심각도
      options:
        - "blocker"
        - "major"
        - "minor"
    validations:
      required: true

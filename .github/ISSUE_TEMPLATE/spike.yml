name: Spike (Go/No-Go)
description: 조기 검증·가정 확인 실험 (T-008, T-009 등)
title: "[T-xxx] [Spike] "
labels: ["type:spike", "status:todo"]
body:
  - type: input
    id: task_id
    attributes:
      label: Task ID
      placeholder: "T-008"
    validations:
      required: true
  - type: input
    id: assumption
    attributes:
      label: 관련 가정 (제9장)
      placeholder: "[가정 1] Solar Pro 3 비전"
  - type: textarea
    id: hypothesis
    attributes:
      label: 검증 가설
    validations:
      required: true
  - type: textarea
    id: procedure
    attributes:
      label: 실험 절차
    validations:
      required: true
  - type: textarea
    id: pass_criteria
    attributes:
      label: 통과 기준
    validations:
      required: true
  - type: textarea
    id: fallback
    attributes:
      label: Fallback (실패 시)
      description: 제9장 Fallback 열 참조
    validations:
      required: true
  - type: input
    id: evidence_path
    attributes:
      label: evidence 저장 경로
      placeholder: "docs/verification/T-008_..."
